server {
    listen 80;
    listen [::]:80;
    server_name homolog.tvsumare.com.br;

    root /srv/tvsumare-enterprise/public;
    index index.php index.html;

    access_log /var/log/nginx/homolog.tvsumare.access.log;
    error_log /var/log/nginx/homolog.tvsumare.error.log;

    client_max_body_size 32m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
